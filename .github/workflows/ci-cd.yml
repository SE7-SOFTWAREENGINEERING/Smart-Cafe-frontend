name: Frontend CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      working-directory: ./
      run: npm install

    - name: Lint
      working-directory: ./
      run: npm run lint
      continue-on-error: true # Presentation hack: keep going even if lint fails

    - name: Run Tests
      working-directory: ./
      run: npm run test

    - name: Build
      working-directory: ./
      run: npm run build

